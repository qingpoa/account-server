spring:
  application:
    name: account-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:classpath:application-${spring.profiles.active}-private.yaml
  datasource:
    url: jdbc:mysql://${app.datasource.host}:${app.datasource.port}/${app.datasource.name}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${app.datasource.username}
    password: ${app.datasource.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    redis:
      host: ${app.redis.host}
      port: ${app.redis.port}
      password: ${app.redis.password:}
      database: ${app.redis.database:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms

#mybatis相关配置
mybatis:
  mapper-locations: classpath:com/qingpo/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

server:
  servlet:
    context-path: /api/v1
  port: 8080

aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucket-name: account-server
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
    domain: https://account-server.oss-cn-beijing.aliyuncs.com
